    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

          "@type": "Question",
          "name": "What should I photograph tonight in astrophotography?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cosmic Frame analyzes real-time conditions (weather, moon phase, object positions) to recommend the best astrophotography targets tonight from your location. Check the dashboard to see visible objects ranked by photogenicity score."
          }
        },
        {
          "@type": "Question",
          "name": "What equipment do I need to start astrophotography?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A classic beginner setup includes a Newton 150/750 telescope (Sky-Watcher), a motorized equatorial mount (HEQ5 or EQM-35), and an astro camera (ZWO ASI533MC Pro). Budget: €1,500–3,000. Use the Cosmic Frame Rig Builder to check your setup compatibility."
          }
        },
        {
          "@type": "Question",
          "name": "How do I calculate sampling in astrophotography?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sampling is calculated with: (pixel size in µm / focal length in mm) × 206.265. The sweet spot for deep sky is 1–2 arcsec/pixel. The Cosmic Frame calculator instantly shows sampling, field of view, and seeing compatibility."
          }
        },
        {
          "@type": "Question",
          "name": "Where can I find astro weather forecasts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cosmic Frame provides real-time astro weather for any location: hourly cloud cover, atmospheric transparency, seeing, humidity, and astronomical times (twilight, moonrise/moonset)."
          }
        }
      ]
    }
    </script>
  <script>
    (function() {
      // Sync: canonical is injected early in <head>, remove it immediately
      document.querySelectorAll('link[rel="canonical"]').forEach(function(el) {
        el.remove();
      });

      // Async: og:image and twitter:image are injected at the END of <head>
      // by the CDN layer, so we need DOMContentLoaded to catch them
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('meta[property="og:image"]:not([data-rh])').forEach(function(el) {
          el.remove();
        });
        document.querySelectorAll('meta[name="twitter:image"]:not([data-rh])').forEach(function(el) {
          el.remove();
        });
      });
    })();
  </script>
