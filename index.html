    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AstroDash",
      "alternateName": ["Night Sky Dashboard", "AstroDash FR"],
      "description": "Application de planification d'astrophotographie : catalogue de 4 800+ objets célestes, comparateur d'équipement, calculateur d'échantillonnage, météo astro, carte de pollution lumineuse.",
      "url": "https://astrodash.fr",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web",
      "inLanguage": ["fr", "en"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "featureList": [
        "Catalogue de 4 800+ objets célestes (Messier, NGC, IC, Sharpless)",
        "Météo astro en temps réel (seeing, couverture nuageuse, transparence)",
        "Phase de la lune et éphémérides",
        "Comparateur de matériel astrophoto (télescopes, caméras, montures, filtres)",
        "Calculateur d'échantillonnage et de champ de vue",
        "Carte de pollution lumineuse",
        "Guide d'exposition par objet",
        "Rig Builder avec diagnostic de compatibilité",
        "Planificateur de session (altitude, visibilité)"
      ],
      "author": {
        "@type": "Person",
        "name": "Cosmic Frame"
      },
      "keywords": "astrophotographie, astronomie, météo astro, télescope, caméra astro, nébuleuse, galaxie, Messier, NGC, deep sky, astrophotography"
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Quoi photographier ce soir en astrophotographie ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AstroDash analyse les conditions en temps réel (météo, phase lunaire, position des objets) pour recommander les meilleures cibles d'astrophoto ce soir depuis votre position. Consultez le dashboard pour voir les objets visibles classés par score de photogénie."
          }
        },
        {
          "@type": "Question",
          "name": "Quel matériel pour débuter en astrophotographie ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pour débuter, un setup classique comprend un télescope Newton 150/750 (Sky-Watcher), une monture équatoriale motorisée (HEQ5 ou EQM-35), et une caméra astro (ZWO ASI533MC Pro). Budget : 1 500 à 3 000€. Utilisez le Rig Builder d'AstroDash pour vérifier la compatibilité de votre setup."
          }
        },
        {
          "@type": "Question",
          "name": "Comment calculer l'échantillonnage en astrophoto ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'échantillonnage se calcule avec la formule : (taille pixel en µm / focale en mm) × 206.265. Le sweet spot pour le ciel profond est 1 à 2 arcsec/pixel. Le calculateur d'AstroDash affiche instantanément l'échantillonnage, le champ de vue et la compatibilité seeing."
          }
        },
        {
          "@type": "Question",
          "name": "Où trouver la météo astro en France ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AstroDash fournit la météo astro en temps réel pour n'importe quelle position en France : couverture nuageuse heure par heure, transparence atmosphérique, seeing, humidité, et horaires astronomiques (crépuscule, lever/coucher de lune)."
          }
        }
      ]
    }
    </script>
